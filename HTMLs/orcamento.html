<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Orçamentos | SCP</title>
    <link rel="stylesheet" href="orcamento.css">
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="sidebar-logo">SCP </div>
            
            <div class="menu-items">
                <a href="../clientes/clientes.html" class="menu-item">
                    <img src="../menu/user.png" alt="Clientes">
                    <span>Clientes</span>
                </a>
                <a href="../categorias/categorias.html" class="menu-item">
                    <img src="../menu/category.png" alt="Categorias"> 
                    <span>Categorias</span>
                </a>
                <a href="../produtos/produtos.html" class="menu-item">
                    <img src="../menu/products.png" alt="Produtos">
                    <span>Produtos</span>
                </a>
                <a href="orcamentos.html" class="menu-item active">
                    <img src="../menu/budget.png" alt="Orçamentos">
                    <span>Orçamentos</span>
                </a>
            </div>
        </div>

        <a href="../login/login.html" class="menu-item sair" id="bt-sair">
            <img src="../menu/logout.png" alt="Sair">
            <span>Sair</span>
        </a>
    </div>

    <div class="content">
        <div class="container">
            
            <div class="form-container">
                <h2>Gerenciamento de Orçamentos</h2>
                <form id="form-orcamento">
                    <input type="hidden" id="orcamento-id">

                    <div class="form-group">
                        <label for="select_cliente">Cliente:</label>
                        <select id="select_cliente" required>
                            <option value="">Carregando clientes...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="select_produto">Produto:</label>
                        <select id="select_produto" required>
                            <option value="">Carregando produtos...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="qtd_produto">Quantidade:</label>
                        <input type="number" id="qtd_produto" min="1" value="1" required>
                    </div>

                    <div id="status-msg"></div>

                    <div class="form-buttons">
                        <button type="submit" id="btn-salvar">Salvar Orçamento</button>
                        <button type="button" id="btn-cancelar" style="display: none;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Valor Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-orcamentos-corpo">
                        <tr><td colspan="6">Carregando orçamentos...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="orcamentos.js"></script>
</body>
</html>
