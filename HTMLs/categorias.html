<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias de Produtos | SCP</title>
    <link rel="stylesheet" href="categorias.css"> 
    <style>
       
        .logo-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .logo-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <a href="../menu/menu.html" class="logo-link">
                <div class="sidebar-logo">SCP</div>
            </a>
            
            <div class="menu-items">
                <a href="../clientes/clientes.html" class="menu-item">
                    <img src="user.png" alt="Clientes">
                    <span>Clientes</span>
                </a>
                <a href="categorias.html" class="menu-item active">
                    <img src="category.png" alt="Categorias"> 
                    <span>Categorias</span>
                </a>
                <a href="../produtos/produtos.html" class="menu-item">
                    <img src="products.png" alt="Produtos">
                    <span>Produtos</span>
                </a>
                <a href="../orcamentos/orcamentos.html" class="menu-item">
                    <img src="budget.png" alt="Orçamentos">
                    <span>Orçamentos</span>
                </a>
            </div>
        </div>
        <a href="../login/login.html" class="menu-item sair" id="bt-sair">
            <img src="logout.png" alt="Sair">
            <span>Sair</span>
        </a>
    </div>

    <div class="content">
        <h2>Gerenciamento de Categorias</h2>
        
        <form id="form-categoria">
            <input type="hidden" id="categoria-id">

            <div class="form-group">
                <label for="descricao_categoria">Nome / Descrição da Categoria:</label>
                <input type="text" id="descricao_categoria" placeholder="Ex: Informática, Escritório, Eletrônicos" required>
            </div>

            <div id="status-msg"></div>

            <div class="form-buttons">
                <button type="submit" id="btn-salvar">Salvar Categoria</button>
                <button type="button" id="btn-cancelar" style="display: none;">Cancelar Edição</button>
            </div>
        </form>

        <hr>

        <h3>Categorias Cadastradas</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descrição da Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-categorias-corpo">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="categorias.js"></script>
</body>
</html>
