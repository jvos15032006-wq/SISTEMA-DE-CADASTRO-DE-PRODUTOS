<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes | SCP</title>
    <link rel="stylesheet" href="../menu/menu.css"> 
    <link rel="stylesheet" href="clientes.css">   
    <style>
        .logo-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .logo-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <a href="../menu/menu.html" class="logo-link">
                <div class="sidebar-logo">SCP</div>
            </a>
            
            <div class="menu-items">
                <a href="clientes.html" class="menu-item active">
                    <img src="../menu/user.png" alt="Clientes">
                    <span>Clientes</span>
                </a>
                <a href="../categorias/categorias.html" class="menu-item">
                    <img src="../menu/category.png" alt="Categorias"> 
                    <span>Categorias</span>
                </a>
                <a href="../produtos/produtos.html" class="menu-item">
                    <img src="../menu/products.png" alt="Produtos">
                    <span>Produtos</span>
                </a>
                <a href="../orcamentos/orcamentos.html" class="menu-item">
                    <img src="../menu/budget.png" alt="Orçamentos">
                    <span>Orçamentos</span>
                </a>
            </div>
        </div>
        <a href="../login/login.html" class="menu-item sair" id="bt-sair">
            <img src="../menu/logout.png" alt="Sair">
            <span>Sair</span>
        </a>
    </div>

    <div class="content">
        <h2>Gerenciamento de Clientes</h2>
        
        <form id="form-cliente">
            <input type="hidden" id="cliente-id">

            <div class="form-group">
                <label for="tipo_cliente">Tipo de Cliente:</label>
                <select id="tipo_cliente" required>
                    <option value="F">Pessoa Física (CPF)</option>
                    <option value="J">Pessoa Jurídica (CNPJ)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cpf_cnpj_cliente">CPF / CNPJ:</label>
                <input type="text" id="cpf_cnpj_cliente" placeholder="Apenas números" required>
            </div>

            <div class="form-group">
                <label for="nome_cliente">Nome / Razão Social:</label>
                <input type="text" id="nome_cliente" placeholder="Nome completo ou Razão Social" required>
            </div>

            <div id="status-msg"></div>

            <div class="form-buttons">
                <button type="submit" id="btn-salvar">Salvar Cliente</button>
                <button type="button" id="btn-cancelar" style="display: none;">Cancelar Edição</button>
            </div>
        </form>

        <hr>

        <h3>Clientes Cadastrados</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>CPF / CNPJ</th>
                        <th>Nome / Razão Social</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes-corpo">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="clientes.js"></script>
</body>
</html>
